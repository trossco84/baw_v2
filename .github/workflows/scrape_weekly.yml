name: Scrape NoJuice Weekly Figures (Run on Fly)

on:
  schedule:
    - cron: "0 12 * * 1"   # keep your current time for now
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run scraper inside Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly ssh console -a baw-v2 -C "xvfb-run -a python -m scripts.scrape_last_week"
