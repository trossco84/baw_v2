name: Scrape NoJuice Weekly Figures

on:
  schedule:
    # Every Monday at 7:00am ET
    # 12:00 UTC = 7:00am ET (standard time)
    - cron: "0 12 * * 1"

  # Allows manual runs from GitHub UI
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          NOJUICE_URL: https://www.nojuice.ag
          NOJUICE_USERNAME: ${{ secrets.NOJUICE_USERNAME }}
          NOJUICE_PASSWORD: ${{ secrets.NOJUICE_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m scripts.scrape_last_week
